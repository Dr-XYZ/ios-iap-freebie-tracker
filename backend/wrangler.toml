name = "ios-iap-freebie-backend"
main = "src/index.js"
compatibility_date = "2024-03-01"

# Environment Variables
[vars]
# Secure Token for crawler POST requests.
# Generate a secure string and configure this in Wrangler secret or wrangler.toml.
API_TOKEN = "freebie-tracker-secure-token"

# Cloudflare D1 Database Binding
[[d1_databases]]
binding = "DB"
database_name = "ios-iap-tracker-db"
database_id = "YOUR_D1_DATABASE_ID_HERE"
migrations_dir = "migrations"
