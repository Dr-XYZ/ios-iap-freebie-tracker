name: iOS IAP Freebie Crawler

on:
  schedule:
    # Runs every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub UI

concurrency:
  group: crawler-group
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-crawler:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so rebase works correctly after concurrency queue wait
          fetch-depth: 0
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: |
          npm init -y
          npm install cheerio

      - name: Run Crawler Script
        run: node crawler.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add database.json freebies.json README.md
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes in freebies or database. Skipping commit."
          else
            git commit -m "Auto Update: iOS IAP Freebies"
            # Retry push up to 3 times with rebase to handle race conditions from concurrency queue
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "Push attempt $i failed, retrying..."
              sleep 5
            done
          fi
